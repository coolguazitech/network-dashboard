# =============================================================================
# Scheduler Configuration — 採集排程
# =============================================================================
#
# v2.19.0 架構：Device-Centric Collection Rounds
#
# SNMP 模式下使用兩個「輪次」取代舊的 12 個獨立 job：
#   - fast_round (300s): mac_table + interface_status（影響客戶端狀態）
#   - full_round (1800s): 所有 10 個 SNMP collectors
#
# 每個輪次遍歷設備一次，每台設備只探測一次 community，
# 然後依序跑該輪次的所有 collectors。不通設備一次判定整台跳過。
#
# Ping 由獨立排程處理（device_ping + client_ping），不走 SNMP 輪次。
#
# API 模式仍使用舊的 per-job 排程（向下相容）。
#
# interval 值會被 setup_scheduled_jobs() 讀取：
#   - Client 相關 collectors 的最小 interval → fast_round 間隔
#   - 指標類 collectors 的最大 interval → full_round 間隔
#
# =============================================================================

fetchers:
  # ---------------------------------------------------------------------------
  # Client 相關 — 300s (5min)
  # 歸入 fast_round（影響客戶端介面匹配、連線狀態）
  # ---------------------------------------------------------------------------
  get_mac_table:
    source: DNA
    interval: 300
    description: "MAC 位址表（Client 介面匹配來源）"

  get_interface_status:
    source: DNA
    interval: 300
    description: "Interface 狀態（速率/雙工，Client 連線狀態）"

  get_static_acl:
    source: FNA
    interval: 300
    description: "Static ACL 綁定（Client 認證狀態）"

  get_dynamic_acl:
    source: FNA
    interval: 300
    description: "Dynamic ACL 綁定（Client 認證狀態）"

  # ---------------------------------------------------------------------------
  # 指標類 — 1800s (30min)
  # 歸入 full_round（純設備健康監控）
  # ---------------------------------------------------------------------------
  get_fan:
    source: DNA
    interval: 1800
    description: "風扇狀態"

  get_power:
    source: DNA
    interval: 1800
    description: "電源供應器狀態"

  get_version:
    source: DNA
    interval: 1800
    description: "韌體版本"

  get_gbic_details:
    source: FNA
    interval: 1800
    description: "光模組 Tx/Rx 功率"

  get_error_count:
    source: FNA
    interval: 1800
    description: "Interface 錯誤計數"

  get_channel_group:
    source: FNA
    interval: 1800
    description: "Port-Channel 狀態及成員"

  get_uplink_lldp:
    source: DNA
    interval: 1800
    description: "Uplink 鄰居拓撲 (LLDP)"

  get_uplink_cdp:
    source: DNA
    interval: 1800
    description: "Uplink 鄰居拓撲 (CDP，僅 Cisco IOS/NXOS)"

  # ---------------------------------------------------------------------------
  # GNMSPING: ICMP 連通性測試（獨立排程，不走 SNMP 輪次）
  # ---------------------------------------------------------------------------
  gnms_ping:
    source: GNMSPING
    interval: 15
    description: "Ping（設備 / Client IP 獨立排程，按 tenant_group 分組）"
